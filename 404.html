<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found | YuanAPI</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0b1120;
            color: #e2e8f0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem;
        }
        .glow {
            font-size: 8rem;
            font-weight: 800;
            background: linear-gradient(135deg, #00f5d4, #00d4ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1;
            margin-bottom: 1rem;
        }
        h1 { font-size: 2rem; font-weight: 600; margin-bottom: 0.75rem; }
        p {
            font-size: 1.1rem; color: #94a3b8; margin-bottom: 2rem;
            max-width: 480px; line-height: 1.6;
        }
        .btn {
            display: inline-block; padding: 0.9rem 2.5rem; border-radius: 8px;
            font-weight: 600; font-size: 1rem; text-decoration: none;
            transition: all 0.3s ease;
            background: linear-gradient(135deg, #00f5d4, #00d4ff);
            color: #0b1120;
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(0,245,212,0.25); }
        .countdown { margin-top: 2rem; font-size: 0.9rem; color: #64748b; }
    </style>
</head>
<body>
    <div class="glow">404</div>
    <h1>Page Not Found</h1>
    <p>Sorry, the page you are looking for does not exist.<br>Redirecting to homepage in 5 seconds.</p>
    <a href="https://yuanapi.vip" class="btn">Back to Homepage →</a>
    <div class="countdown" id="countdown">5 seconds...</div>
    <script>
        let s = 5;
        const el = document.getElementById('countdown');
        setInterval(function(){ s--; if(s<=0) window.location.href='https://yuanapi.vip'; else el.textContent=s+' seconds...'; }, 1000);
    </script>
</body>
</html>
